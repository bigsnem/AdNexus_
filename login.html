<!DOCTYPE html>
<html>

<head>
    <title>Login - AdNexus</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h2 class="logo">🌍 AdNexus</h2>

    <div>
        <a href="index.html">Home</a>
        <a href="post-ad.html">Post Ad</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<div class="featured-ad">

    <h1>Login</h1>

    <p>Welcome back! Sign in to your account.</p>

    <form>

        <input
            type="email"
            placeholder="Email Address"
            required>

        <br><br>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required>

        <br><br>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <br>

    <p>Don't have an account?</p>

    <button class="post-btn" onclick="window.location.href='register.html'">
        Create Account
    </button>

    <br><br>

    <button class="login-btn" onclick="goHome()">
        ← Back to Home
    </button>

</div>

<script type="module" src="firebase.js"></script> <script type="module" src="auth.js"></script> <script src="script.js"></script>

</body>

</html>
